  <script>
    // Pre-hydrate theme so dark mode never flashes white on refresh.
    // Runs synchronously before CSS/JS modules load.
    try {
      var t = localStorage.getItem("cockpit.theme");
      if (t === "dark" || t === "light")
        document.documentElement.dataset.theme = t;
    } catch (e) {}
  </script>
  <style>
    /* Match the body bg to the picked theme tokens so the page paints the
       correct color before tokens.css loads. Mirrors values in tokens.css. */
    html[data-theme="dark"] {
      background: #131617;
    }
    html:not([data-theme="dark"]) {
      background: #f5f3ed;
    }
  </style>

<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mana</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <!-- PWA -->
  <meta name="theme-color" content="#131617" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mana" />
  <script>
    // Pre-hydrate theme so dark mode never flashes white on refresh.
    // Runs synchronously before CSS/JS modules load. For "auto" we can't run
    // the sun calc this early, so we trust the resolved bool the app cached
    // last time (cockpit.theme.dark); the app re-resolves and corrects on boot.
    try {
      var t = localStorage.getItem("cockpit.theme") || "auto";
      var dark =
        t === "dark" ? true
        : t === "light" ? false
        : localStorage.getItem("cockpit.theme.dark") === "1";
      document.documentElement.dataset.theme = dark ? "dark" : "light";
    } catch (e) {}
  </script>
  <style>
    /* Match the body bg to the picked theme tokens so the page paints the
       correct color before tokens.css loads. Mirrors values in tokens.css. */
    html[data-theme="dark"] {
      background: #131617;
    }
    html:not([data-theme="dark"]) {
      background: #f5f3ed;
    }
  </style>
  <script type="module" crossorigin src="/assets/index-D2TuMT6p.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-CTwFxmXt.css">
</head>
<body>
  <mana-app></mana-app>
</body>
</html>
